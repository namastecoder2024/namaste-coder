<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Modal</title>

<style>

/* BODY */
body{
    font-family: Arial, sans-serif;
    background:#0f1624;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    background:linear-gradient(45deg,#00d4ff,#00ffa6);
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* MODAL BACKGROUND */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

/* MODAL BOX */
.modal-content{
    background:#111827;
    padding:25px;
    border-radius:12px;
    width:300px;
    position:relative;
    text-align:center;
    box-shadow:0 0 20px rgba(0,212,255,0.3);
}

/* CLOSE BUTTON */
.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    background:#1f2937;
    color:#fff;
}

/* HOVER EFFECT */
.btn:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<!-- OPEN BUTTON -->
<button class="btn" onclick="openLogin()">Open Login</button>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">

    <div class="modal-content">

        <span class="close" id="closeLogin">&times;</span>

        <h2>Login</h2>

        <form>
            <input type="email" placeholder="Enter Email" required>
            <input type="password" placeholder="Enter Password" required>
            <button class="btn">Login</button>
        </form>

    </div>

</div>

<script>

// GET ELEMENTS
const loginModal = document.getElementById("loginModal");
const closeLogin = document.getElementById("closeLogin");

// OPEN
function openLogin(){
    loginModal.style.display = "flex";
}

// CLOSE BUTTON
closeLogin.onclick = function(){
    loginModal.style.display = "none";
}

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
    if(e.target === loginModal){
        loginModal.style.display = "none";
    }
}

</script>

</body>
</html>
