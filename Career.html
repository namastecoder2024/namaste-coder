<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Modal</title>

<style>

/* BODY */
body{
    font-family: Arial, sans-serif;
    background:#0f1624;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* BUTTON */
.btn{
    padding:12px 25px;
    background:linear-gradient(45deg,#00d4ff,#00ffa6);
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* MODAL BACKGROUND */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

/* MODAL BOX */
.modal-content{
    background:#111827;
    padding:25px;
    border-radius:12px;
    width:320px;
    position:relative;
    text-align:center;
    box-shadow:0 0 20px rgba(0,212,255,0.3);
}

/* CLOSE BUTTON */
.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
}

/* INPUT + TEXTAREA */
input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    background:#1f2937;
    color:#fff;
    outline:none;
}

/* TEXTAREA */
textarea{
    resize:none;
}

/* HOVER */
.btn:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<!-- OPEN BUTTON -->
<button class="btn" onclick="openCareer()">Apply for Job</button>

<!-- CAREER MODAL -->
<div class="modal" id="careerModal">

    <div class="modal-content">

        <span class="close" id="closeCareer">&times;</span>

        <h2>Career Opportunities</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="text" placeholder="Your Skills (HTML, CSS, JS...)" required>
            <textarea placeholder="Why should we hire you?" rows="4"></textarea>
            <button class="btn">Apply Now</button>
        </form>

    </div>

</div>

<script>

// GET ELEMENTS
const careerModal = document.getElementById("careerModal");
const closeCareer = document.getElementById("closeCareer");

// OPEN
function openCareer(){
    careerModal.style.display = "flex";
}

// CLOSE BUTTON
closeCareer.onclick = function(){
    careerModal.style.display = "none";
}

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
    if(e.target === careerModal){
        careerModal.style.display = "none";
    }
}

</script>

</body>
</html>
